name: Advanced Tech News Scraper with Retry

on:
  schedule:
    # 每天 UTC 9:00 (北京时间 17:00)
    - cron: '0 9 * * *'
  # 每天 UTC 14:00 (北京时间 22:00) - 备用运行
  # 当主运行失败时的重试
    - cron: '0 14 * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    
    strategy:
      max-parallel: 1
      matrix:
        attempt: [1, 2, 3]
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🐍 Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: ✅ Verify dependencies
      run: |
        python verify_dependencies.py
    
    - name: 🚀 Run tech news scraper (Attempt ${{ matrix.attempt }}/3)
      env:
        WEIXIN_WEBHOOK_KEY: ${{ secrets.WEIXIN_WEBHOOK_KEY }}
      run: |
        echo "=========================================="
        echo "🤖 Tech News Scraper - Attempt ${{ matrix.attempt }}"
        echo "=========================================="
        python scraper.py
        exit_code=$?
        echo "=========================================="
        echo "Exit Code: $exit_code"
        echo "=========================================="
        exit $exit_code
      continue-on-error: ${{ matrix.attempt < 3 }}
    
    - name: 📊 Log execution details
      if: always()
      run: |
        echo "=========================================="
        echo "📊 Execution Summary"
        echo "=========================================="
        echo "✅ Workflow Status: ${{ job.status }}"
        echo "⏰ Execution Time: $(date -u)"
        echo "🔄 Attempt: ${{ matrix.attempt }}/3"
        echo "📍 Runner: ${{ runner.os }}-${{ runner.arch }}"
        echo "🐍 Python Version: $(python --version)"
        echo "=========================================="
    
    - name: 💬 Send notification on failure
      if: failure() && matrix.attempt == 3
      run: |
        echo "❌ All 3 attempts failed!"
        echo "Please check the logs above for details."
      env:
        WEIXIN_WEBHOOK_KEY: ${{ secrets.WEIXIN_WEBHOOK_KEY }}
    
    - name: ✨ Send success notification
      if: success()
      run: |
        echo "✅ Scraper completed successfully!"
        echo "📰 News has been pushed to WeChat!"

  notify-on-failure:
    runs-on: ubuntu-latest
    needs: scrape-and-notify
    if: failure()
    
    steps:
    - name: 📢 Notify failure
      run: |
        echo "⚠️ Warning: Scraper workflow failed!"
        echo "Please check the logs at: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
