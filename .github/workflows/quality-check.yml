name: CI/CD Quality Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  quality-check:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8
    
    - name: Lint with Flake8
      run: |
        # Stop on syntax errors or undefined names
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Warnings (non-blocking)
        flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Test module imports
      run: |
        cd src
        python -c "from scrapers import NewsScraper; print('NewsScraper imported OK')"
        python -c "from config import NEWS_SOURCES; print('config imported OK')"
    
    - name: Check for exposed secrets
      run: |
        if grep -rn "WEIXIN_WEBHOOK_KEY" src/ --include="*.py" | grep -v "os.getenv\|os.environ"; then
          echo "WARNING: Potential hardcoded secrets found!"
          exit 1
        else
          echo "No hardcoded secrets found"
        fi
    
    - name: Summary
      if: always()
      run: |
        echo "Status: ${{ job.status }}"
        echo "Quality check completed"
