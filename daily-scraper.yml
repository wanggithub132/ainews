name: Daily Tech News Scraper

on:
  schedule:
    # 每天 UTC 9:00 (北京时间 17:00)
    - cron: '0 9 * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  scrape-and-notify:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: 🐍 Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests feedparser
    
    - name: 🚀 Run tech news scraper
      env:
        WEIXIN_WEBHOOK_KEY: ${{ secrets.WEIXIN_WEBHOOK_KEY }}
      run: |
        echo "=========================================="
        echo "🤖 Tech News Scraper Starting"
        echo "=========================================="
        python scraper.py
        echo "=========================================="
        echo "✅ Scraper completed"
        echo "=========================================="
    
    - name: 📊 Check execution status
      if: always()
      run: |
        echo "Status: ${{ job.status }}"
